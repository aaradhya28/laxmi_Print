<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
</head>
<body>
    {% extends "base.html" %}

    {% block content %}
    <h2 class="mb-4">Our Products</h2>

<div class="row">
    {% for product in products %}
        
    

    <!-- Product -->
    <div class="col-md-4 mb-4">
        <div class="card shadow">
            <img src="{{ url_for('static', filename='uploads/'+ product[3]) }}" class="card-img-top">
            <div class="card-body text-center">
                <h5 >{{product[1]}}</h5>
                <p>{{product[2]}}</p>
                <a href="/product_details/{{product[0]}}" class="btn btn-dark">View Details</a>
            </div>
        </div>
        </div>
        {% endfor %}
    </div>
    
        
    {% endblock %}
    
</body>
</html>
