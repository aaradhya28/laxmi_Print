
    {% extends "base.html" %}

    {% block content %}
    <div class="page-content products-page">
    <h2 class="mb-4">Our Products</h2>

<div class="row">
    {% for product in products %}
        
    

    
    <div class="col-md-4 mb-4">
        <div class="card shadow">
            <img src="{{ url_for('static', filename='uploads/'+ product.image) }}?v=1" class="card-img-top">
            <div class="card-body text-center">
                <h5 >{{product.name}}</h5>
                <p>{{product.description}}</p>
                <a href="/product_details/{{product.id}}" class="btn btn-dark">View Details</a>
            </div>
        </div>
        </div>
        {% endfor %}
    </div>
    
        
    </div>
    {% endblock %}
