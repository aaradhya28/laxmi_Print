<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    {% extends "base.html" %}

{% block content %}

<h2 class="text-center mb-4">Contact Us</h2>

<div class="row">

<div class="col-md-6">

<form method="POST">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email"
placeholder="example@gmail.com"
 class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="tel"
       name="phone"
       class="form-control"
       placeholder="Enter 10 digit phone number"
       pattern="[0-9]{10}"
       maxlength="10"
       required>
       <!-- <small class="text-muted">Enter a valid 10-digit phone number</small> -->
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea name="message" rows="4" class="form-control" required></textarea>
</div>

<button type="submit" class="btn btn-dark w-100">
Send Message
</button>

</form>

</div>

<div class="col-md-6">

<h4>LaxmiPrint</h4>

<p>
📍 Thane<br>
📞 +91 XXXXX XXXXX<br>
✉ laxmiprint@email.com
</p>

<p>
Feel free to contact us for any printing needs like visiting cards,
banners, stickers, flyers and more.
</p>

</div>

</div>

{% endblock %}
    
</body>
</html>
